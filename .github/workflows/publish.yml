name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.8.21)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  smoke-test:
    name: CLI packaging smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          SKIP_BUILD_BUMP: '1'

      - name: Run CLI smoke tests
        run: npx vitest run test/cli-packaging-smoke.test.ts

  publish-sdk:
    name: Publish @bradygaster/squad-sdk
    needs: smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "📦 Publishing version: ${VERSION}"

      - name: Install dependencies
        run: npm ci

      - name: Build squad-sdk
        run: npm -w packages/squad-sdk run build

      - name: Verify package version matches target
        run: |
          PKG_VERSION=$(node -p "require('./packages/squad-sdk/package.json').version")
          if [[ "$PKG_VERSION" != "${{ steps.version.outputs.version }}" ]]; then
            echo "::error::Package version ($PKG_VERSION) does not match target version (${{ steps.version.outputs.version }})"
            exit 1
          fi
          echo "✅ Package version matches: $PKG_VERSION"

      - name: Publish squad-sdk to npm
        run: npm -w packages/squad-sdk publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm publication
        run: |
          echo "✅ @bradygaster/squad-sdk@${{ steps.version.outputs.version }} published to npm"
          for i in 1 2 3 4 5; do
            if npm view @bradygaster/squad-sdk@${{ steps.version.outputs.version }} version 2>/dev/null; then
              echo "✅ Verified on npm registry"
              exit 0
            fi
            echo "⏳ Registry propagation attempt $i/5, waiting 15s..."
            sleep 15
          done
          echo "⚠️ Registry propagation slow — package was published successfully, verification timed out"

  publish-cli:
    name: Publish @bradygaster/squad-cli
    needs: [smoke-test, publish-sdk]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "📦 Publishing version: ${VERSION}"

      - name: Install dependencies
        run: npm ci

      - name: Build squad-sdk (required for CLI project references)
        run: npm -w packages/squad-sdk run build

      - name: Build squad-cli
        run: npm -w packages/squad-cli run build

      - name: Verify package version matches target
        run: |
          PKG_VERSION=$(node -p "require('./packages/squad-cli/package.json').version")
          if [[ "$PKG_VERSION" != "${{ steps.version.outputs.version }}" ]]; then
            echo "::error::Package version ($PKG_VERSION) does not match target version (${{ steps.version.outputs.version }})"
            exit 1
          fi
          echo "✅ Package version matches: $PKG_VERSION"

      - name: Publish squad-cli to npm
        run: npm -w packages/squad-cli publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm publication
        run: |
          echo "✅ @bradygaster/squad-cli@${{ steps.version.outputs.version }} published to npm"
          for i in 1 2 3 4 5; do
            if npm view @bradygaster/squad-cli@${{ steps.version.outputs.version }} version 2>/dev/null; then
              echo "✅ Verified on npm registry"
              exit 0
            fi
            echo "⏳ Registry propagation attempt $i/5, waiting 15s..."
            sleep 15
          done
          echo "⚠️ Registry propagation slow — package was published successfully, verification timed out"
